            <line x1="44" y1="20" x2="44" y2="30" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
            <line x1="56" y1="20" x2="56" y2="30" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
            <line x1="44" y1="70" x2="44" y2="80" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
            <line x1="56" y1="70" x2="56" y2="80" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
            <path d="M 38,30 L 60,30 A 10,10 0 0 1 60,50 A 10,10 0 0 1 60,70 L 38,70 Z" fill="none" stroke="#FFFFFF"
                stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
            <line x1="38" y1="50" x2="60" y2="50" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
        </g>
    </g>

    <text x="145" y="78" font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800"
        font-size="52" fill="#FFFFFF" letter-spacing="-1.5">LUCKY<tspan fill="#F7931A">HIVE</tspan></text>
