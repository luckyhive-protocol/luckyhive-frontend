        <!-- Outer perimeter path -->
        <path
            d="M 60,10 L 80.78,22 L 80.78,46 L 101.56,58 L 101.56,82 L 80.78,94 L 60,82 L 39.22,94 L 18.44,82 L 18.44,58 L 39.22,46 L 39.22,22 Z"
            fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" />

        <!-- Inner Y lines -->
        <path d="M 60,58 L 60,82 M 60,58 L 39.22,46 M 60,58 L 80.78,46" fill="none" stroke="#FFFFFF" stroke-width="6"
            stroke-linecap="round" />

        <!-- Tilted Bitcoin 'B' inside C1 -->
